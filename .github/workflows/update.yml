name: Scrape & Deploy Evolution Buyback Tracker

on:
  schedule:
    # Evolution publishes acquisition reports on Mondays (for prior week).
    # Run Mon/Tue/Wed 17:00 UTC (after Stockholm close) to catch them.
    - cron: '0 17 * * 1,2,3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        run: |
          cd scripts
          python scraper.py

      - name: Regenerate index.html from data.json
        run: |
          cd scripts
          python build_html.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "📊 EVO data opdateret $(date -u +%Y-%m-%d)"
          git push
